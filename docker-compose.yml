services:
  backend:
    build:
      context: .
      dockerfile: SmartHome.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=smarthome_db;Username=postgres;Password=postgres
      Jwt__Key: "OhEG4TYn8FhX7tYQ6pIjl5Hu3KfWsmNkA//DUUtc47s="
      Jwt__Issuer: "SmartHome"
      Jwt__Audience: "SmartHome"
      Jwt__ExpiresMinutes: 60
      DeviceIngest__Key: "f9A2kL0PqZ_ESP32_ingest_!@#_2026"
      Swagger__Enabled: "true"
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: smarthome_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - smarthome_pgdata:/var/lib/postgresql/data

volumes:
  smarthome_pgdata: